<html>
  <head>
    <style>
      body {
        background: #131722;
        color: #d1d4dc;
        font-family: "Cascadia Code", monospace;
        margin: 0;
        padding: 20px;
      }
      #chart-container {
        width: 100%;
        height: 450px;
        border: 1px solid #2f333d;
        margin-bottom: 30px;
      }

      /* Table Styling - The Grid */
      .grid-container {
        overflow-x: auto;
        background: #1c202b;
        border-radius: 8px;
        padding: 10px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        white-space: nowrap;
        font-size: 12px;
      }
      th {
        background: #2f333d;
        color: #848e9c;
        cursor: pointer;
        padding: 12px;
        text-align: left;
        position: sticky;
        top: 0;
      }
      th:hover {
        color: #fff;
      }
      td {
        border-bottom: 1px solid #2f333d;
        padding: 8px 12px;
        color: #e1e3e6;
      }
      tr:hover {
        background: #2b2f3a;
      }

      h2 {
        color: #f0b90b;
        margin-top: 0;
      }
    </style>
  </head>
  <body>
    <h2>{{SUBJECT}} Monitor</h2>

    <div id="chart-container" style="height: 450px"></div>

    <div class="grid-container">
      <table id="target-table">
        <thead>
          <tr>
            {{TABLE_HEADERS}}
          </tr>
        </thead>
        <tbody>
          {{TABLE_BODY}}
        </tbody>
      </table>
    </div>

    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tablesort/5.2.1/tablesort.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tablesort/5.2.1/tablesort.number.min.js"></script>

    <script>
      try {
        new Tablesort(document.getElementById('target-table'));

        const chart = LightweightCharts.createChart(document.getElementById('chart-container'), {
          width: document.getElementById('chart-container').clientWidth,
          height: 450,
          layout: { background: { color: '#131722' }, textColor: '#d1d4dc' },
          grid: { vertLines: { color: '#2f333d' }, horzLines: { color: '#2f333d' } },
          timeScale: { timeVisible: true }
        });

        // Match your working 'addSeries' syntax exactly
        const candleSeries = chart.addSeries(LightweightCharts.CandlestickSeries, {
          upColor: '#26a69a', downColor: '#ef5350',
          wickUpColor: '#26a69a', wickDownColor: '#ef5350'
        });

        // INJECTION POINT: This will be replaced by a stringified JSON array
        const data = {{DATA}};
        candleSeries.setData(data);
        chart.timeScale().fitContent();

      } catch (e) { console.error("Frontend Init Error:", e); }
    </script>
  </body>
</html>
